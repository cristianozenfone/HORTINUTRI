<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HortiNutri ERP - v12.0 Estabilizada</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #2e7d32; --secondary: #1976d2; --danger: #d32f2f; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .navbar { background: var(--primary); display: flex; sticky: top; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .nav-item { color: white; padding: 15px; cursor: pointer; font-weight: bold; flex: 1; text-align: center; }
        .nav-item.active { background: rgba(255,255,255,0.2); border-bottom: 4px solid white; }
        .container { padding: 15px; max-width: 1100px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { border: none; font-weight: bold; cursor: pointer; padding: 12px; border-radius: 8px; color: white; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: center; }
        .stat-card { padding: 15px; border-radius: 10px; color: white; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-item active" id="btn-cadastros" onclick="showTab('cadastros')">📂 CADASTROS</div>
    <div class="nav-item" id="btn-vendas" onclick="showTab('vendas')">💰 VENDAS</div>
    <div class="nav-item" id="btn-relatorios" onclick="showTab('relatorios')">📊 FINANCEIRO</div>
</div>

<div class="container">
    <div id="tab-cadastros" class="tab-pane">
        <div class="card">
            <h3>Novo Registro</h3>
            <div class="grid-form">
                <select id="cad-tipo" onchange="renderizarTudo()">
                    <option value="insumos">🥦 Insumos</option>
                    <option value="clientes">🤝 Clientes</option>
                    <option value="embalagens">📦 Embalagens</option>
                </select>
                <input type="text" id="cad-nome" placeholder="Nome">
                <input type="number" id="cad-v1" placeholder="Valor 1">
                <input type="number" id="cad-v2" placeholder="Valor 2">
            </div>
            <button class="btn" style="background:var(--primary)" onclick="salvarCadastro()">SALVAR</button>
        </div>
        <div class="card">
            <div id="tabela-cadastros">Carregando dados do banco...</div>
        </div>
    </div>

    <div id="tab-vendas" class="tab-pane" style="display:none;">
        <div class="card">
            <h3>Lançar Venda</h3>
            <div class="grid-form">
                <input type="text" id="v-cliente" placeholder="Cliente">
                <input type="text" id="v-produto" placeholder="Produto">
                <input type="number" id="v-qtd" value="1">
                <input type="number" id="v-preco" placeholder="Preço">
                <input type="number" id="v-custo" placeholder="Custo">
            </div>
            <button class="btn" style="background:var(--secondary)" onclick="lancarVenda()">CONFIRMAR VENDA</button>
        </div>
        <div class="card">
            <div id="lista-vendas-html"></div>
        </div>
    </div>

    <div id="tab-relatorios" class="tab-pane" style="display:none;">
        <div class="stats-grid">
            <div class="stat-card" style="background: var(--secondary);">Vendas<br><strong id="rel-fat">R$ 0,00</strong></div>
            <div class="stat-card" style="background: var(--danger);">Custos<br><strong id="rel-custo">R$ 0,00</strong></div>
            <div class="stat-card" style="background: var(--primary);">Lucro<br><strong id="rel-lucro">R$ 0,00</strong></div>
        </div>
        <button class="btn" style="background:var(--danger); margin-top:20px;" onclick="exportarPDF()">GERAR PDF</button>
    </div>
</div>

<script>
    // 1. CONFIGURAÇÃO (Não altere estas chaves)
    const firebaseConfig = {
        apiKey: "AIzaSyAs-W_ZGYzNWMwZDktODkzYS00NWY2LTkyYjEtZDQwYWQwZGMzMGRm",
        authDomain: "hortinutri-3f2ea.firebaseapp.com",
        databaseURL: "https://hortinutri-3f2ea-default-rtdb.firebaseio.com",
        projectId: "hortinutri-3f2ea",
        storageBucket: "hortinutri-3f2ea.appspot.com",
        messagingSenderId: "596792658513",
        appId: "1:596792658513:web:92bb97b0d835efc5510670"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let dadosApp = {};

    // 2. FUNÇÕES DE RENDERIZAÇÃO (Definidas antes do uso para evitar o erro do print)
    function renderizarTudo() {
        // Renderizar Cadastros
        const tipo = document.getElementById('cad-tipo').value;
        const listaCad = dadosApp[tipo] || {};
        let htmlCad = `<table><tr><th>Nome</th><th>Excluir</th></tr>`;
        for(let id in listaCad) {
            htmlCad += `<tr><td>${listaCad[id].nome}</td><td><button onclick="remover('${tipo}/${id}')">🗑️</button></td></tr>`;
        }
        document.getElementById('tabela-cadastros').innerHTML = htmlCad + "</table>";

        // Renderizar Vendas
        const vendas = dadosApp.vendas || {};
        let htmlVen = `<table><tr><th>Data</th><th>Produto</th><th>Total</th></tr>`;
        let arrVendas = Object.keys(vendas).map(id => ({id, ...vendas[id]})).reverse();
        arrVendas.forEach(v => {
            htmlVen += `<tr><td>${v.data || ''}</td><td>${v.produto || ''}</td><td>R$ ${(v.qtd * v.preco || 0).toFixed(2)}</td></tr>`;
        });
        document.getElementById('lista-vendas-html').innerHTML = htmlVen + "</table>";

        // Atualizar Financeiro (Proteção contra NaN)
        let fat = 0, custo = 0;
        for(let id in vendas) {
            fat += (vendas[id].qtd * vendas[id].preco) || 0;
            custo += (vendas[id].qtd * vendas[id].custo) || 0;
        }
        document.getElementById('rel-fat').innerText = "R$ " + fat.toFixed(2);
        document.getElementById('rel-custo').innerText = "R$ " + custo.toFixed(2);
        document.getElementById('rel-lucro').innerText = "R$ " + (fat - custo).toFixed(2);
    }

    // 3. ESCUTA DO BANCO DE DADOS
    db.ref('/').on('value', snapshot => {
        dadosApp = snapshot.val() || {};
        console.log("Dados recebidos:", dadosApp);
        renderizarTudo();
    });

    // 4. AÇÕES
    function salvarCadastro() {
        const tipo = document.getElementById('cad-tipo').value;
        const nome = document.getElementById('cad-nome').value.toUpperCase();
        if(!nome) return alert("Nome vazio!");
        db.ref(tipo).push({
            nome: nome,
            v1: parseFloat(document.getElementById('cad-v1').value) || 0,
            v2: parseFloat(document.getElementById('cad-v2').value) || 0
        });
        document.getElementById('cad-nome').value = "";
    }

    function lancarVenda() {
        const venda = {
            data: new Date().toLocaleString('pt-BR'),
            cliente: document.getElementById('v-cliente').value.toUpperCase(),
            produto: document.getElementById('v-produto').value.toUpperCase(),
            qtd: parseFloat(document.getElementById('v-qtd').value) || 0,
            preco: parseFloat(document.getElementById('v-preco').value) || 0,
            custo: parseFloat(document.getElementById('v-custo').value) || 0
        };
        if(!venda.produto) return alert("Produto vazio!");
        db.ref('vendas').push(venda);
    }

    function remover(caminho) {
        if(confirm("Excluir?")) db.ref(caminho).remove();
    }

    function showTab(tab) {
        document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('tab-' + tab).style.display = 'block';
        document.getElementById('btn-' + tab).classList.add('active');
    }

    function exportarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.text("Relatório HortiNutri", 10, 10);
        const rows = [];
        for(let id in (dadosApp.vendas || {})) {
            const v = dadosApp.vendas[id];
            rows.push([v.data, v.produto, v.qtd, (v.qtd*v.preco).toFixed(2)]);
        }
        doc.autoTable({ head: [['Data', 'Prod', 'Qtd', 'Total']], body: rows });
        doc.save('financeiro.pdf');
    }
</script>
</body>
</html>
