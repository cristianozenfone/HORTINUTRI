<div id="tab-vendas" class="tab-pane" style="display:none;">
        <div class="card">
            <h2>🛠️ Montar Ficha Técnica (Multi-Ingredientes)</h2>
            
            <div style="margin-bottom: 20px;">
                <label>Nome do Produto Final</label>
                <input type="text" id="kit-nome" placeholder="Ex: Kit Sopão Família">
            </div>

            <div class="card" style="background: #f9f9f9; border: 1px dashed #ccc;">
                <h4>🍎 Adicionar Ingrediente</h4>
                <div class="grid-form">
                    <div>
                        <label>Ingrediente</label>
                        <select id="sel-insumo"></select>
                    </div>
                    <div>
                        <label>Peso Líquido (g)</label>
                        <input type="number" id="temp-peso" placeholder="Ex: 150">
                    </div>
                    <div style="display: flex; align-items: flex-end;">
                        <button class="btn" style="background: var(--secondary); color:white; width: 100%;" onclick="addIngrediente()">+ ADICIONAR</button>
                    </div>
                </div>
            </div>

            <h4>📋 Composição do Kit</h4>
            <table id="tabela-kit">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Peso Liq.</th>
                        <th>Peso Bruto (c/ FC)</th>
                        <th>Custo Parcial</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="lista-corpo-kit">
                    </tbody>
            </table>

            <div class="grid-form" style="margin-top:20px;">
                <div>
                    <label>Embalagem</label>
                    <select id="sel-emb" onchange="atualizarTotalKit()"></select>
                </div>
                <div>
                    <label>Etiqueta</label>
                    <select id="sel-etq" onchange="atualizarTotalKit()"></select>
                </div>
            </div>

            <div class="cost-box">
                <div class="cost-title">Custo Total de Produção: <span id="res-custo-total">R$ 0,00</span></div>
            </div>
            
            <button class="btn btn-save" style="background: var(--primary); width: 100%;" onclick="salvarKitFinal()">SALVAR PRODUTO NO CATÁLOGO</button>
        </div>
    </div>

<script>
    // ... (suas funções de iniciarApp e syncData continuam iguais) ...

    let ingredientesNoKit = [];

    function addIngrediente() {
        const id = document.getElementById('sel-insumo').value;
        const peso = parseFloat(document.getElementById('temp-peso').value);
        
        if(id && peso > 0) {
            const ins = listaInsumos[id];
            const pesoBruto = (peso / 1000) * parseFloat(ins.fc);
            const custo = pesoBruto * parseFloat(ins.preco);
            
            ingredientesNoKit.push({
                nome: ins.nome,
                pesoLiq: peso,
                pesoBruto: (pesoBruto * 1000).toFixed(0),
                custo: custo
            });
            
            renderizarListaKit();
            document.getElementById('temp-peso').value = "";
        }
    }

    function renderizarListaKit() {
        let html = "";
        let total = 0;
        ingredientesNoKit.forEach((item, index) => {
            total += item.custo;
            html += `<tr>
                <td>${item.nome}</td>
                <td>${item.pesoLiq}g</td>
                <td>${item.pesoBruto}g</td>
                <td>R$ ${item.custo.toFixed(2)}</td>
                <td><button onclick="removerIngrediente(${index})">❌</button></td>
            </tr>`;
        });
        document.getElementById('lista-corpo-kit').innerHTML = html;
        atualizarTotalKit(total);
    }

    function removerIngrediente(index) {
        ingredientesNoKit.splice(index, 1);
        renderizarListaKit();
    }

    function atualizarTotalKit(valorIngredientes = 0) {
        // Se não passar valor, recalcula dos itens atuais
        if(valorIngredientes === 0) {
            ingredientesNoKit.forEach(i => valorIngredientes += i.custo);
        }
        
        const vEmb = parseFloat(document.getElementById('sel-emb').value) || 0;
        const vEtq = parseFloat(document.getElementById('sel-etq').value) || 0;
        const totalFinal = valorIngredientes + vEmb + vEtq;
        
        document.getElementById('res-custo-total').innerText = "R$ " + totalFinal.toFixed(2);
    }

    // ... (mantenha o resto das funções) ...
</script>
