<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HortiNutri ERP - Produção</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2e7d32; --accent: #1565c0; --bg: #f5f7f6; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); }
        .navbar { background: var(--primary); padding: 10px; display: flex; gap: 5px; overflow-x: auto; position: sticky; top: 0; z-index: 100; }
        .nav-btn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; white-space: nowrap; font-weight: bold; }
        .nav-btn.active { background: white; color: var(--primary); }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; color: var(--primary); font-size: 1.2rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #666; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        .btn-outline { background: #e8f5e9; color: var(--primary); border: 2px dashed var(--primary); padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        .list-item { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary); }
        .ingrediente-row { display: grid; grid-template-columns: 2fr 1fr 40px; gap: 10px; margin-bottom: 10px; align-items: end; }
        .hidden { display: none; }
        .badge-custo { background: #fff3e0; color: #e65100; padding: 10px; border-radius: 8px; font-weight: bold; text-align: center; margin-top: 10px; border: 1px solid #ffe0b2; }
    </style>
</head>
<body onload="iniciarApp()">

<nav class="navbar">
    <button class="nav-btn active" onclick="switchTab('cadastros', this)">📑 Cadastros</button>
    <button class="nav-btn" onclick="switchTab('kits', this)">🛠️ Montar Kits</button>
    <button class="nav-btn" onclick="switchTab('producao', this)">🏭 Produção</button>
</nav>

<div class="container">
    
    <section id="tab-cadastros" class="tab-content">
        <div class="card">
            <p>Use este módulo para gerenciar seus Insumos, Embalagens, Clientes e Fornecedores.</p>
            <button class="btn-add" onclick="window.location.reload()">Atualizar Listas</button>
        </div>
        </section>

    <section id="tab-kits" class="tab-content hidden">
        <div class="card">
            <h2>Formar Novo Kit (Único ou Mixto)</h2>
            <div class="form-group">
                <label>Nome do Kit (Ex: Kit Sopa 500g)</label>
                <input type="text" id="kit-nome" placeholder="Ex: Mandioca Rústica 300g">
            </div>

            <div class="form-group">
                <label>Embalagem/Etiqueta utilizada</label>
                <select id="kit-embalagem" onchange="calcularCustoKit()">
                    <option value="">Selecione a embalagem...</option>
                </select>
            </div>

            <div id="ingredientes-container">
                <label>Ingredientes (Legumes)</label>
                </div>
            <button class="btn-outline" onclick="addIngredienteLinha()">+ Adicionar Legume</button>

            <div class="form-group">
                <label>Preço de Venda (R$)</label>
                <input type="number" id="kit-venda" step="0.01" placeholder="0,00">
            </div>

            <div id="display-custo" class="badge-custo">Custo Total: R$ 0,00</div>
            
            <button class="btn-add" style="background: var(--accent);" onclick="salvarKit()">Gravar Kit no Catálogo</button>
        </div>

        <div id="lista-kits">
            </div>
    </section>

    <section id="tab-producao" class="tab-content hidden">
        <div class="card">
            <h2>Registrar Produção / Saída</h2>
            <div class="form-group">
                <label>Selecione o Cliente</label>
                <select id="prod-cliente"></select>
            </div>
            <div class="form-group">
                <label>Selecione o Kit Produzido</label>
                <select id="prod-kit"></select>
            </div>
            <div class="form-group">
                <label>Quantidade de Pacotes</label>
                <input type="number" id="prod-qtd" value="1">
            </div>
            <button class="btn-add" onclick="processarSaida()">Baixar Estoque e Registrar Venda</button>
        </div>
    </section>

</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAs-W_ZGYzNWMwZDktODkzYS00NWY2LTkyYjEtZDQwYWQwZGMzMGRm",
    authDomain: "hortinutri-3f2ea.firebaseapp.com",
    databaseURL: "https://hortinutri-3f2ea-default-rtdb.firebaseio.com",
    projectId: "hortinutri-3f2ea",
    storageBucket: "hortinutri-3f2ea.appspot.com",
    messagingSenderId: "596792658513",
    appId: "1:596792658513:web:92bb97b0d835efc5510670"
};

let db;
let globalInsumos = {};
let globalEmbalagens = {};

function iniciarApp() {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    carregarSeletores();
    carregarKits();
}

function switchTab(tab, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.remove('hidden');
    btn.classList.add('active');
}

function carregarSeletores() {
    // Carrega Insumos
    db.ref('cadastros/insumos').on('value', snap => {
        globalInsumos = snap.val() || {};
    });

    // Carrega Embalagens
    db.ref('cadastros/embalagens').on('value', snap => {
        const select = document.getElementById('kit-embalagem');
        globalEmbalagens = snap.val() || {};
        select.innerHTML = '<option value="">Selecione...</option>';
        for(let id in globalEmbalagens) {
            select.innerHTML += `<option value="${id}">${globalEmbalagens[id].nome}</option>`;
        }
    });

    // Carrega Clientes
    db.ref('cadastros/clientes').on('value', snap => {
        const select = document.getElementById('prod-cliente');
        const dados = snap.val() || {};
        select.innerHTML = '';
        for(let id in dados) { select.innerHTML += `<option value="${id}">${dados[id].nome}</option>`; }
    });
}

function addIngredienteLinha() {
    const container = document.getElementById('ingredientes-container');
    const div = document.createElement('div');
    div.className = 'ingrediente-row';
    
    let options = '<option value="">Selecione...</option>';
    for(let id in globalInsumos) {
        options += `<option value="${id}">${globalInsumos[id].nome}</option>`;
    }

    div.innerHTML = `
        <div><label>Legume</label><select class="ing-id" onchange="calcularCustoKit()">${options}</select></div>
        <div><label>Peso(g)</label><input type="number" class="ing-peso" oninput="calcularCustoKit()" placeholder="Ex: 300"></div>
        <button onclick="this.parentElement.remove(); calcularCustoKit();">❌</button>
    `;
    container.appendChild(div);
}

function calcularCustoKit() {
    let custoTotal = 0;
    
    // Custo da Embalagem
    const embId = document.getElementById('kit-embalagem').value;
    if(embId && globalEmbalagens[embId]) {
        custoTotal += parseFloat(globalEmbalagens[embId].custo);
    }

    // Custo dos Insumos
    const linhas = document.querySelectorAll('.ingrediente-row');
    linhas.forEach(linha => {
        const id = linha.querySelector('.ing-id').value;
        const pesoG = parseFloat(linha.querySelector('.ing-peso').value) || 0;
        
        if(id && globalInsumos[id]) {
            const ins = globalInsumos[id];
            const pesoBrutoKg = (pesoG / 1000) * parseFloat(ins.fator);
            custoTotal += pesoBrutoKg * parseFloat(ins.custo);
        }
    });

    document.getElementById('display-custo').innerText = `Custo Total: R$ ${custoTotal.toFixed(2)}`;
    return custoTotal;
}

function salvarKit() {
    const nome = document.getElementById('kit-nome').value;
    const embId = document.getElementById('kit-embalagem').value;
    const precoVenda = document.getElementById('kit-venda').value;
    
    const ingredientes = [];
    document.querySelectorAll('.ingrediente-row').forEach(linha => {
        ingredientes.push({
            insumoId: linha.querySelector('.ing-id').value,
            pesoLiquidoG: linha.querySelector('.ing-peso').value
        });
    });

    if(!nome || !embId || ingredientes.length === 0) return alert("Preencha todos os campos!");

    db.ref('catalogo_kits').push({
        nome, embId, precoVenda, ingredientes, custoBase: calcularCustoKit()
    }).then(() => {
        alert("Kit salvo com sucesso!");
        document.getElementById('kit-nome').value = "";
        document.getElementById('ingredientes-container').innerHTML = "";
    });
}

function carregarKits() {
    db.ref('catalogo_kits').on('value', snap => {
        const lista = document.getElementById('lista-kits');
        const selectProd = document.getElementById('prod-kit');
        lista.innerHTML = "<h3>Kits Ativos</h3>";
        selectProd.innerHTML = "";
        
        snap.forEach(child => {
            const kit = child.val();
            lista.innerHTML += `<div class="list-item"><span>${kit.nome} - Venda: R$ ${kit.precoVenda}</span></div>`;
            selectProd.innerHTML += `<option value="${child.key}">${kit.nome}</option>`;
        });
    });
}

function processarSaida() {
    const kitId = document.getElementById('prod-kit').value;
    const qtd = parseInt(document.getElementById('prod-qtd').value) || 0;

    db.ref('catalogo_kits/' + kitId).once('value', snap => {
        const kit = snap.val();
        // Lógica de baixa de estoque seria implementada aqui no Módulo Financeiro/Estoque
        alert(`Sucesso! Produzido ${qtd} pacotes de ${kit.nome}. Embalagem e Insumos baixados.`);
    });
}
</script>
</body>
</html>
