<style>
    /* Adicione/Substitua estas regras no seu <style> */
    .grid-menu { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); 
        gap: 10px; 
        margin-bottom: 20px; 
    }
    .btn-cadastro {
        background: #f1f8e9;
        border: 2px solid #a5d6a7;
        color: #2e7d32;
        padding: 15px 10px;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        transition: 0.3s;
    }
    .btn-cadastro:hover { background: #c8e6c9; }
    .btn-cadastro i { font-size: 1.2rem; }
</style>

<div id="tab-cadastros" class="tab-content">
    <div class="card">
        <h2>📂 Gerenciar Cadastros</h2>
        
        <div class="grid-menu">
            <button class="btn-cadastro" onclick="showSubTab('insumo')">
                <span>🥦</span> Insumos
            </button>
            <button class="btn-cadastro" onclick="showSubTab('embalagem')">
                <span>📦</span> Embalagens
            </button>
            <button class="btn-cadastro" onclick="showSubTab('cliente')">
                <span>🤝</span> Clientes
            </button>
            <button class="btn-cadastro" onclick="showSubTab('fornecedor')">
                <span>🚚</span> Fornecedores
            </button>
        </div>

        <div id="sub-insumo" class="sub-tab" style="display:none; border-top: 1px solid #eee; padding-top: 15px;">
             <h3>🥦 Novo Insumo</h3>
             <input type="text" id="ins-nome" placeholder="Nome do Legume (Ex: Abóbora)">
             <input type="number" id="ins-fator" step="0.01" placeholder="Fator de Perda (Ex: 1.65)">
             <button class="btn-green" onclick="salvarGenerico('insumos', 'ins-nome', 'ins-fator')">Cadastrar Legume</button>
        </div>

        <div id="sub-embalagem" class="sub-tab" style="display:none; border-top: 1px solid #eee; padding-top: 15px;">
             <h3>📦 Nova Embalagem/Etiqueta</h3>
             <input type="text" id="emb-nome" placeholder="Ex: Saco 14x25 + Etiqueta">
             <input type="number" id="emb-custo" step="0.01" placeholder="Custo Unitário R$">
             <button class="btn-green" onclick="salvarGenerico('embalagens', 'emb-nome', 'emb-custo')">Salvar Embalagem</button>
        </div>
        
        </div>
</div>
