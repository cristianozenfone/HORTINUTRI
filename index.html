<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HORTINUTRI ERP</title>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>

body{
font-family:Segoe UI;
background:#f4f7f6;
margin:0;
}

.navbar{
display:flex;
background:#2e7d32;
}

.nav-item{
flex:1;
padding:14px;
color:white;
font-weight:bold;
text-align:center;
cursor:pointer;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
}

input{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.btn-save{
background:#2e7d32;
color:white;
}

.btn-del{
background:#d32f2f;
color:white;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div id="login" style="display:flex;align-items:center;justify-content:center;height:100vh">

<div style="background:white;padding:30px;border-radius:10px;width:300px;text-align:center">

<h3>HORTINUTRI ERP</h3>

<input id="user" placeholder="Usuário"><br><br>

<input id="pass" type="password" placeholder="Senha"><br><br>

<button onclick="logar()">Entrar</button>

</div>

</div>

<div id="app" style="display:none">

<div class="navbar">

<div class="nav-item" onclick="tab('cad')">CADASTROS</div>
<div class="nav-item" onclick="tab('estoque')">ESTOQUE</div>
<div class="nav-item" onclick="logout()">SAIR</div>

</div>

<div class="container">

<div id="cad">

<div class="card">

<h3>Cadastro de Insumos</h3>

<div class="grid">

<input id="ins-nome" placeholder="Nome">

<input id="ins-fc" placeholder="Fator Correção">

<input id="ins-preco" placeholder="Preço Kg">

<input id="ins-est" placeholder="Estoque Kg">

<input id="ins-min" placeholder="Estoque mínimo">

</div>

<br>

<button class="btn-save" onclick="salvarInsumo()">Salvar</button>

</div>

<div class="card">

<h3>Lista</h3>

<div id="tab-insumos"></div>

</div>

</div>

<div id="estoque" style="display:none">

<div class="card">

<h3>Estoque</h3>

<div id="tab-est"></div>

</div>

</div>

</div>

</div>

<script>

/* CONFIG FIREBASE */

const firebaseConfig={
apiKey:"SUA_API",
authDomain:"SEU_DOMINIO",
databaseURL:"SUA_DATABASE_URL",
projectId:"SEU_PROJECT"
}

let db
let dados={}

/* LOGIN */

function logar(){

if(user.value==="admin" && pass.value==="1234"){

localStorage.setItem("logado","sim")

login.style.display="none"
app.style.display="block"

startApp()

}else{

alert("Login inválido")

}

}

/* AUTO LOGIN */

window.onload=function(){

if(localStorage.getItem("logado")==="sim"){

login.style.display="none"
app.style.display="block"

startApp()

}

}

/* LOGOUT */

function logout(){

localStorage.removeItem("logado")

location.reload()

}

/* INICIAR FIREBASE */

function startApp(){

firebase.initializeApp(firebaseConfig)

db=firebase.database()

escutar()

}

/* LISTENER */

function escutar(){

db.ref("erp_v2/insumos").on("value",s=>{

dados=s.val()||{}

tabInsumos()

estoqueTela()

})

}

/* NAVEGAÇÃO */

function tab(x){

document.getElementById("cad").style.display="none"
document.getElementById("estoque").style.display="none"

document.getElementById(x).style.display="block"

}

/* SALVAR INSUMO */

function salvarInsumo(){

db.ref("erp_v2/insumos").push({

nome:document.getElementById("ins-nome").value,

fc:parseFloat(document.getElementById("ins-fc").value),

preco:parseFloat(document.getElementById("ins-preco").value),

estoque:parseFloat(document.getElementById("ins-est").value),

min:parseFloat(document.getElementById("ins-min").value)

})

document.getElementById("ins-nome").value=""
document.getElementById("ins-fc").value=""
document.getElementById("ins-preco").value=""
document.getElementById("ins-est").value=""
document.getElementById("ins-min").value=""

}

/* TABELA INSUMOS */

function tabInsumos(){

let h="<table>"

for(let id in dados){

let i=dados[id]

h+=`<tr>
<td>${i.nome}</td>
<td>R$ ${i.preco}</td>
<td>${i.estoque} kg</td>
<td><button class="btn-del" onclick="del('${id}')">X</button></td>
</tr>`

}

h+="</table>"

tab_insumos.innerHTML=h

}

/* ESTOQUE */

function estoqueTela(){

let h="<table>"

for(let id in dados){

let i=dados[id]

h+=`<tr>
<td>${i.nome}</td>
<td>${i.estoque} kg</td>
</tr>`

}

h+="</table>"

tab_est.innerHTML=h

}

/* DELETE */

function del(id){

if(confirm("Excluir?")){

db.ref("erp_v2/insumos/"+id).remove()

}

}

</script>

</body>
</html>
