<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HortiNutri ERP | Gestão Profissional</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2e7d32;
            --sidebar-color: #263238;
            --bg-color: #f8f9fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { display: flex; background-color: var(--bg-color); min-height: 100vh; overflow-x: hidden; }

        /* Sidebar com Nomes Visíveis */
        .sidebar {
            width: 180px; 
            height: 100vh;
            background-color: var(--sidebar-color);
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            overflow-y: auto;
        }

        .logo { padding: 15px; text-align: center; background: rgba(0,0,0,0.2); border-bottom: 1px solid #444; }
        .logo h2 { color: var(--primary-color); font-size: 18px; }
        .logo span { font-size: 10px; display: block; }

        nav ul { list-style: none; padding: 10px 0; }
        nav ul li {
            padding: 12px 15px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }
        nav ul li i { width: 20px; text-align: center; }
        nav ul li:hover, nav ul li.active { background: var(--primary-color); }
        
        .menu-title { padding: 15px 15px 5px; font-size: 10px; color: #888; font-weight: bold; text-transform: uppercase; }
        .menu-title-single { border-top: 1px solid #444; margin-top: 5px; font-weight: bold; }
