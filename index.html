```html
<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HORTINUTRI ERP</title>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<style>

body{
font-family:Segoe UI;
background:#f4f7f6;
margin:0;
}

.navbar{
display:flex;
background:#2e7d32;
}

.nav-item{
flex:1;
padding:14px;
color:white;
font-weight:bold;
text-align:center;
cursor:pointer;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
}

input{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.btn-save{
background:#2e7d32;
color:white;
}

.btn-edit{
background:#ff9800;
color:white;
}

.btn-del{
background:#d32f2f;
color:white;
}

.alerta{
background:#ffebee;
color:#c62828;
font-weight:bold;
padding:4px 8px;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #eee;
text-align:left;
}

</style>
</head>

<body>

<div id="login" style="display:flex;align-items:center;justify-content:center;height:100vh">

<div style="background:white;padding:30px;border-radius:10px;width:300px;text-align:center">

<h3>HORTINUTRI ERP</h3>

<input id="user" placeholder="Usuário"><br><br>
<input id="pass" type="password" placeholder="Senha"><br><br>

<button onclick="logar()">Entrar</button>

</div>
</div>

<div id="app" style="display:none">

<div class="navbar">

<div class="nav-item" onclick="tab('cad')">CADASTROS</div>
<div class="nav-item" onclick="tab('estoque')">ESTOQUE</div>
<div class="nav-item" onclick="logout()">SAIR</div>

</div>

<div class="container">

<div id="cad">

<div class="card">

<h3>Cadastro de Insumos</h3>

<div class="grid">

<input id="ins-nome" placeholder="Nome">
<input id="ins-fc" placeholder="Fator Correção">
<input id="ins-preco" placeholder="Preço Kg">
<input id="ins-est" placeholder="Estoque Kg">
<input id="ins-min" placeholder="Estoque mínimo">

</div>

<br>

<button class="btn-save" onclick="salvarInsumo()">Salvar</button>

</div>

<div class="card">

<h3>Lista de Insumos</h3>

<div id="tab-insumos"></div>

</div>

</div>

<div id="estoque" style="display:none">

<div class="card">

<h3>Controle de Estoque</h3>

<div id="tab-est"></div>

</div>

</div>

</div>
</div>

<script>

/* FIREBASE */

const firebaseConfig = {
apiKey: "AIzaSyAtdGSt1_3VRIQDN0WX7UJsqPxSyV4wg",
authDomain: "hortinutri-3f2ea.firebaseapp.com",
databaseURL: "https://hortinutri-3f2ea-default-rtdb.firebaseio.com",
projectId: "hortinutri-3f2ea",
storageBucket: "hortinutri-3f2ea.firebasestorage.app",
messagingSenderId: "596792658513",
appId: "1:596792658513:web:92bb97b0d835efc5510670"
};

firebase.initializeApp(firebaseConfig)

const db = firebase.database()

let dados={}
let editId=null

/* LOGIN */

function logar(){

if(user.value==="admin" && pass.value==="1234"){

localStorage.setItem("logado","sim")

login.style.display="none"
app.style.display="block"

escutar()

}else{

alert("Login inválido")

}

}

window.onload=function(){

if(localStorage.getItem("logado")==="sim"){

login.style.display="none"
app.style.display="block"

escutar()

}

}

function logout(){

localStorage.removeItem("logado")
location.reload()

}

/* FIREBASE LISTENER */

function escutar(){

db.ref("erp_v2/insumos").on("value",s=>{

dados=s.val()||{}

tabInsumos()
estoqueTela()

})

}

/* NAVEGAÇÃO */

function tab(x){

document.getElementById("cad").style.display="none"
document.getElementById("estoque").style.display="none"

document.getElementById(x).style.display="block"

}

/* SALVAR */

function salvarInsumo(){

let nome=ins_nome.value
let fc=parseFloat(ins_fc.value)||0
let preco=parseFloat(ins_preco.value)||0
let est=parseFloat(ins_est.value)||0
let min=parseFloat(ins_min.value)||0

if(nome===""){
alert("Digite o nome")
return
}

let custoLiquido=(preco/fc).toFixed(2)

let obj={
nome:nome,
fc:fc,
preco:preco,
custo:custoLiquido,
estoque:est,
min:min
}

if(editId){

db.ref("erp_v2/insumos/"+editId).update(obj)
editId=null

}else{

db.ref("erp_v2/insumos").push(obj)

}

limpar()

}

/* LIMPAR */

function limpar(){

ins_nome.value=""
ins_fc.value=""
ins_preco.value=""
ins_est.value=""
ins_min.value=""

}

/* EDITAR */

function editar(id){

let i=dados[id]

ins_nome.value=i.nome
ins_fc.value=i.fc
ins_preco.value=i.preco
ins_est.value=i.estoque
ins_min.value=i.min

editId=id

}

/* DELETE */

function del(id){

if(confirm("Excluir?")){

db.ref("erp_v2/insumos/"+id).remove()

}

}

/* TABELA INSUMOS */

function tabInsumos(){

let h="<table><tr><th>Nome</th><th>Preço</th><th>FC</th><th>Custo Líq</th><th>Estoque</th><th></th></tr>"

for(let id in dados){

let i=dados[id]

h+=`<tr>
<td>${i.nome}</td>
<td>R$ ${i.preco}</td>
<td>${i.fc}</td>
<td>R$ ${i.custo}</td>
<td>${i.estoque}kg</td>
<td>
<button class="btn-edit" onclick="editar('${id}')">Editar</button>
<button class="btn-del" onclick="del('${id}')">X</button>
</td>
</tr>`

}

h+="</table>"

tab_insumos.innerHTML=h

}

/* ESTOQUE */

function estoqueTela(){

let h="<table><tr><th>Produto</th><th>Estoque</th><th>Status</th></tr>"

for(let id in dados){

let i=dados[id]

let status="OK"

if(i.estoque<=i.min){

status=`<span class="alerta">Estoque baixo</span>`

}

h+=`<tr>
<td>${i.nome}</td>
<td>${i.estoque} kg</td>
<td>${status}</td>
</tr>`

}

h+="</table>"

tab_est.innerHTML=h

}

</script>

</body>
</html>
