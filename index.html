<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HortiNutri ERP - v10.0 Realtime</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        :root { --primary: #2e7d32; --secondary: #1976d2; --danger: #d32f2f; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: #333; }
        .navbar { background: var(--primary); display: flex; position: sticky; top: 0; z-index: 1000; overflow-x: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .nav-item { color: white; padding: 15px 20px; cursor: pointer; font-weight: bold; white-space: nowrap; border-bottom: 4px solid transparent; }
        .nav-item.active { border-bottom-color: #fff; background: rgba(255,255,255,0.1); }
        .container { padding: 15px; max-width: 1100px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 12px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { border: none; font-weight: bold; cursor: pointer; padding: 12px; border-radius: 8px; color: white; transition: 0.3s; }
        .btn-save { background: var(--primary); width: 100%; }
        .btn-pdf { background: var(--danger); margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { text-align: left; padding: 10px; background: #f8f9fa; border-bottom: 2px solid #eee; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        .stat-card { padding: 15px; border-radius: 10px; color: white; text-align: center; }
        .badge-del { background: none; border: none; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body onload="iniciarApp()">

<div class="navbar">
    <div class="nav-item active" id="btn-cadastros" onclick="showTab('cadastros')">📂 CADASTROS</div>
    <div class="nav-item" id="btn-vendas" onclick="showTab('vendas')">💰 VENDAS</div>
    <div class="nav-item" id="btn-relatorios" onclick="showTab('relatorios')">📊 RELATÓRIOS</div>
</div>

<div class="container">
    <div id="tab-cadastros" class="tab-pane">
        <div class="card">
            <h3>Novo Cadastro</h3>
            <div class="grid-form">
                <select id="cad-tipo" onchange="renderizarCadastros()">
                    <option value="insumos">🥦 Insumo</option>
                    <option value="clientes">🤝 Cliente</option>
                    <option value="embalagens">📦 Embalagem</option>
                </select>
                <input type="text" id="cad-nome" placeholder="Nome/Descrição">
                <input type="number" id="cad-v1" step="0.01" placeholder="Fator ou Preço">
                <input type="number" id="cad-v2" step="0.01" placeholder="Preço KG (se insumo)">
            </div>
            <button class="btn btn-save" onclick="salvarCadastro()">SALVAR NO BANCO</button>
        </div>
        <div class="card">
            <h3>Registros Salvos</h3>
            <div id="tabela-cadastros">Carregando dados...</div>
        </div>
    </div>

    <div id="tab-vendas" class="tab-pane" style="display:none;">
        <div class="card">
            <h3>💰 Registrar Venda</h3>
            <div class="grid-form">
                <input type="text" id="v-cliente" placeholder="Nome do Cliente">
                <input type="text" id="v-produto" placeholder="Produto/Kit">
                <input type="number" id="v-qtd" value="1" placeholder="Qtd">
                <input type="number" id="v-preco" step="0.01" placeholder="Preço Venda (R$)">
                <input type="number" id="v-custo" step="0.01" placeholder="Custo Prod. (R$)">
            </div>
            <button class="btn btn-save" style="background:var(--secondary);" onclick="lancarVenda()">✅ CONFIRMAR VENDA</button>
        </div>
        <div class="card">
            <h3>📋 Histórico de Vendas</h3>
            <div id="lista-vendas-html"></div>
        </div>
    </div>

    <div id="tab-relatorios" class="tab-pane" style="display:none;">
        <div class="stats-grid">
            <div class="stat-card" style="background: var(--secondary);">Vendas: <strong id="rel-fat">R$ 0,00</strong></div>
            <div class="stat-card" style="background: var(--danger);">Custos: <strong id="rel-custo">R$ 0,00</strong></div>
            <div class="stat-card" style="background: var(--primary);">Lucro: <strong id="rel-lucro">R$ 0,00</strong></div>
        </div>
        <br>
        <button class="btn btn-pdf" onclick="exportarPDF()">📄 GERAR RELATÓRIO PDF</button>
    </div>
</div>

<script>
    // CONFIGURAÇÃO DO SEU FIREBASE (CRISTIANO)
    const firebaseConfig = {
        apiKey: "AIzaSyAs-W_ZGYzNWMwZDktODkzYS00NWY2LTkyYjEtZDQwYWQwZGMzMGRm",
        authDomain: "hortinutri-3f2ea.firebaseapp.com",
        databaseURL: "https://hortinutri-3f2ea-default-rtdb.firebaseio.com",
        projectId: "hortinutri-3f2ea",
        storageBucket: "hortinutri-3f2ea.appspot.com",
        messagingSenderId: "596792658513",
        appId: "1:596792658513:web:92bb97b0d835efc5510670"
    };

    let db;
    let dadosApp = { insumos: {}, clientes: {}, embalagens: {}, vendas: {} };

    function iniciarApp() {
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        db = firebase.database();
        
        // Escuta a RAIZ '/' para carregar os dados antigos e novos
        db.ref('/').on('value', snapshot => {
            const data = snapshot.val() || {};
            dadosApp = {
                insumos: data.insumos || {},
                clientes: data.clientes || {},
                embalagens: data.embalagens || {},
                vendas: data.vendas || {}
            };
            renderizarCadastros();
            renderizarVendas();
            atualizarFinanceiro();
        });
    }

    function showTab(tab) {
        document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('tab-' + tab).style.display = 'block';
        document.getElementById('btn-' + tab).classList.add('active');
    }

    // --- CADASTROS ---
    function salvarCadastro() {
        const tipo = document.getElementById('cad-tipo').value;
        const nome = document.getElementById('cad-nome').value.toUpperCase();
        if(!nome) return alert("Preencha o nome!");

        const registro = {
            nome: nome,
            v1: parseFloat(document.getElementById('cad-v1').value) || 0,
            v2: parseFloat(document.getElementById('cad-v2').value) || 0
        };

        db.ref(tipo).push(registro).then(() => {
            alert("Salvo!");
            document.getElementById('cad-nome').value = "";
        });
    }

    function renderizarCadastros() {
        const tipo = document.getElementById('cad-tipo').value;
        let html = `<table><tr><th>Nome</th><th>Ação</th></tr>`;
        const lista = dadosApp[tipo] || {};
        for(let id in lista) {
            html += `<tr><td>${lista[id].nome}</td><td><button class="badge-del" onclick="remover('${tipo}/${id}')">🗑️</button></td></tr>`;
        }
        document.getElementById('tabela-cadastros').innerHTML = html + "</table>";
    }

    // --- VENDAS ---
    function lancarVenda() {
        const agora = new Date();
        const dataStr = agora.toLocaleDateString('pt-BR') + ' ' + agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});

        const venda = {
            data: dataStr,
            cliente: document.getElementById('v-cliente').value.toUpperCase() || "GERAL",
            produto: document.getElementById('v-produto').value.toUpperCase(),
            qtd: parseFloat(document.getElementById('v-qtd').value) || 0,
            preco: parseFloat(document.getElementById('v-preco').value) || 0,
            custo: parseFloat(document.getElementById('v-custo').value) || 0
        };

        if(!venda.produto) return alert("Qual o produto?");

        db.ref('vendas').push(venda).then(() => {
            alert("Venda registrada!");
            ['v-produto', 'v-preco', 'v-custo'].forEach(id => document.getElementById(id).value = '');
        });
    }

    function renderizarVendas() {
        let html = `<table><tr><th>Data</th><th>Produto</th><th>Total</th><th>Ação</th></tr>`;
        const vendas = dadosApp.vendas || {};
        let arrVendas = Object.keys(vendas).map(id => ({id, ...vendas[id]}));
        arrVendas.reverse().forEach(v => {
            html += `<tr>
                <td><small>${v.data}</small></td>
                <td>${v.produto}</td>
                <td>R$ ${(v.qtd * v.preco).toFixed(2)}</td>
                <td><button class="badge-del" onclick="remover('vendas/${v.id}')">🗑️</button></td>
            </tr>`;
        });
        document.getElementById('lista-vendas-html').innerHTML = html + "</table>";
    }

    function atualizarFinanceiro() {
        let fat = 0, custoTotal = 0;
        const vendas = dadosApp.vendas || {};
        for(let id in vendas) {
            const v = vendas[id];
            fat += (parseFloat(v.qtd) * parseFloat(v.preco)) || 0;
            custoTotal += (parseFloat(v.qtd) * parseFloat(v.custo)) || 0;
        }
        document.getElementById('rel-fat').innerText = "R$ " + fat.toFixed(2);
        document.getElementById('rel-custo').innerText = "R$ " + custoTotal.toFixed(2);
        document.getElementById('rel-lucro').innerText = "R$ " + (fat - custoTotal).toFixed(2);
    }

    function exportarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18);
        doc.text("Relatório de Vendas - HortiNutri", 14, 20);
        
        const rows = [];
        const vendas = dadosApp.vendas || {};
        for(let id in vendas) {
            const v = vendas[id];
            rows.push([v.data, v.cliente, v.produto, v.qtd, (v.qtd * v.preco).toFixed(2)]);
        }

        doc.autoTable({
            head: [['Data', 'Cliente', 'Produto', 'Qtd', 'Total (R$)']],
            body: rows,
            startY: 30,
            theme: 'striped'
        });
        doc.save('Relatorio_HortiNutri.pdf');
    }

    function remover(caminho) {
        if(confirm("Deseja realmente excluir este registro?")) {
            db.ref(caminho).remove();
        }
    }
</script>
</body>
</html>
