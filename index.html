<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HortiNutri ERP - Cadastros</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2e7d32; --accent: #1565c0; --bg: #f5f7f6; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); }
        
        /* Menu Superior */
        .navbar { background: var(--primary); padding: 10px; display: flex; gap: 5px; overflow-x: auto; position: sticky; top: 0; z-index: 100; }
        .nav-btn { background: rgba(255,255,255,0.15); border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; white-space: nowrap; font-weight: bold; }
        .nav-btn.active { background: white; color: var(--primary); }

        .container { padding: 15px; max-width: 800px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h2 { margin-top: 0; color: var(--primary); font-size: 1.2rem; border-bottom: 2px solid #eee; padding-bottom: 10px; }

        /* Formulários */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #666; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        
        .btn-add { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        
        /* Listagem */
        .list-item { background: #f9f9f9; padding: 12px; border-radius: 8px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary); }
        .btn-del { background: #ff5252; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        .hidden { display: none; }
    </style>
</head>
<body onload="iniciarApp()">

<nav class="navbar">
    <button class="nav-btn active" onclick="switchTab('insumos', this)">🥦 Insumos</button>
    <button class="nav-btn" onclick="switchTab('embalagens', this)">📦 Embalagens</button>
    <button class="nav-btn" onclick="switchTab('clientes', this)">🤝 Clientes</button>
    <button class="nav-btn" onclick="switchTab('fornecedores', this)">🚚 Fornecedores</button>
</nav>

<div class="container">
    
    <section id="tab-insumos" class="tab-content">
        <div class="card">
            <h2>Cadastro de Insumo (Matéria-Prima)</h2>
            <div class="form-group"><label>Nome</label><input type="text" id="ins-nome" placeholder="Ex: Cenoura"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="form-group"><label>Custo KG (R$)</label><input type="number" id="ins-custo" step="0.01"></div>
                <div class="form-group"><label>Fator (FAT.C)</label><input type="number" id="ins-fator" step="0.01" value="1.00"></div>
            </div>
            <button class="btn-add" onclick="salvar('insumos')">Salvar Insumo</button>
        </div>
        <div id="lista-insumos"></div>
    </section>

    <section id="tab-embalagens" class="tab-content hidden">
        <div class="card">
            <h2>Cadastro de Embalagens/Etiquetas</h2>
            <div class="form-group"><label>Nome/Tamanho</label><input type="text" id="emb-nome" placeholder="Ex: Saco 14x20 + Etiqueta M"></div>
            <div class="form-group"><label>Custo Unitário (R$)</label><input type="number" id="emb-custo" step="0.01"></div>
            <button class="btn-add" onclick="salvar('embalagens')">Salvar Embalagem</button>
        </div>
        <div id="lista-embalagens"></div>
    </section>

    <section id="tab-clientes" class="tab-content hidden">
        <div class="card">
            <h2>Cadastro de Clientes/Parceiros</h2>
            <div class="form-group"><label>Nome do Estabelecimento</label><input type="text" id="cli-nome" placeholder="Ex: Supermercado Gaúcho"></div>
            <div class="form-group"><label>Contato/Telefone</label><input type="text" id="cli-contato"></div>
            <button class="btn-add" onclick="salvar('clientes')">Salvar Cliente</button>
        </div>
        <div id="lista-clientes"></div>
    </section>

    <section id="tab-fornecedores" class="tab-content hidden">
        <div class="card">
            <h2>Cadastro de Fornecedores</h2>
            <div class="form-group"><label>Nome/Razão Social</label><input type="text" id="for-nome" placeholder="Ex: Ceasa Palmas"></div>
            <div class="form-group"><label>Produto Principal</label><input type="text" id="for-prod"></div>
            <button class="btn-add" onclick="salvar('fornecedores')">Salvar Fornecedor</button>
        </div>
        <div id="lista-fornecedores"></div>
    </section>

</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAs-W_ZGYzNWMwZDktODkzYS00NWY2LTkyYjEtZDQwYWQwZGMzMGRm",
    authDomain: "hortinutri-3f2ea.firebaseapp.com",
    databaseURL: "https://hortinutri-3f2ea-default-rtdb.firebaseio.com",
    projectId: "hortinutri-3f2ea",
    storageBucket: "hortinutri-3f2ea.appspot.com",
    messagingSenderId: "596792658513",
    appId: "1:596792658513:web:92bb97b0d835efc5510670"
};

let db;

function iniciarApp() {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    carregarDados('insumos');
    carregarDados('embalagens');
    carregarDados('clientes');
    carregarDados('fornecedores');
}

function switchTab(tab, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.remove('hidden');
    btn.classList.add('active');
}

function salvar(tipo) {
    let dados = {};
    let ref = db.ref('cadastros/' + tipo).push();

    if (tipo === 'insumos') {
        dados = { nome: document.getElementById('ins-nome').value, custo: document.getElementById('ins-custo').value, fator: document.getElementById('ins-fator').value };
    } else if (tipo === 'embalagens') {
        dados = { nome: document.getElementById('emb-nome').value, custo: document.getElementById('emb-custo').value };
    } else if (tipo === 'clientes') {
        dados = { nome: document.getElementById('cli-nome').value, contato: document.getElementById('cli-contato').value };
    } else if (tipo === 'fornecedores') {
        dados = { nome: document.getElementById('for-nome').value, produto: document.getElementById('for-prod').value };
    }

    if (!dados.nome) return alert("Preencha pelo menos o nome!");
    
    ref.set(dados).then(() => {
        alert("Cadastrado com sucesso!");
        limparInputs(tipo);
    });
}

function carregarDados(tipo) {
    db.ref('cadastros/' + tipo).on('value', (snapshot) => {
        const lista = document.getElementById('lista-' + tipo);
        lista.innerHTML = "";
        snapshot.forEach((child) => {
            const val = child.val();
            lista.innerHTML += `
                <div class="list-item">
                    <span><strong>${val.nome}</strong> ${val.custo ? '- R$ '+val.custo : ''}</span>
                    <button class="btn-del" onclick="remover('${tipo}', '${child.key}')">🗑️</button>
                </div>`;
        });
    });
}

function remover(tipo, id) {
    if(confirm("Deseja excluir este item?")) {
        db.ref('cadastros/' + tipo + '/' + id).remove();
    }
}

function limparInputs(tipo) {
    const prefixo = tipo.substring(0,3);
    document.querySelectorAll(`input[id^="${prefixo}-"]`).forEach(i => i.value = "");
}
</script>
</body>
</html>
