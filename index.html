<script>
// ... (mantenha suas configurações de Firebase aqui)

function iniciarApp() {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    carregarDados('insumos');
    carregarDados('embalagens');
    carregarDados('clientes');
    carregarKits();
    ativarProducao(); // Nova função para monitorar a aba de produção
}

// --- NOVA FUNÇÃO DE PRODUÇÃO ---
function ativarProducao() {
    const selectKit = document.getElementById('prod-kit');
    const selectCli = document.getElementById('prod-cliente');

    // Carrega os Kits no seletor de Produção
    db.ref('catalogo_kits').on('value', snap => {
        selectKit.innerHTML = '<option value="">Selecione o Kit...</option>';
        snap.forEach(child => {
            selectKit.innerHTML += `<option value="${child.key}">${child.val().nome}</option>`;
        });
    });

    // Carrega os Clientes no seletor de Produção
    db.ref('cadastros/clientes').on('value', snap => {
        selectCli.innerHTML = '<option value="">Selecione o Cliente...</option>';
        snap.forEach(child => {
            selectCli.innerHTML += `<option value="${child.key}">${child.val().nome}</option>`;
        });
    });
}

function processarSaida() {
    const kitId = document.getElementById('prod-kit').value;
    const qtd = parseInt(document.getElementById('prod-qtd').value);
    const clienteId = document.getElementById('prod-cliente').value;

    if (!kitId || !qtd || !clienteId) return alert("Preencha todos os campos da produção!");

    db.ref('catalogo_kits/' + kitId).once('value', snap => {
        const kit = snap.val();
        
        // 1. Baixa de Embalagem
        if (kit.emb) {
            const refEmb = db.ref('estoque/embalagens/' + kit.emb);
            refEmb.transaction(atual => (atual || 0) - qtd);
        }

        // 2. Baixa de cada Insumo do Kit (considerando FAT.C)
        kit.ings.forEach(ing => {
            const insumo = globalInsumos[ing.id];
            if (insumo) {
                const pesoBrutoBaixar = (ing.g / 1000) * insumo.fator * qtd;
                const refIns = db.ref('estoque/insumos/' + ing.id);
                refIns.transaction(atual => (atual || 0) - pesoBrutoBaixar);
            }
        });

        // 3. Registra a Venda no Financeiro
        const valorVendaTotal = parseFloat(kit.venda) * qtd;
        db.ref('vendas').push({
            data: new Date().toISOString(),
            cliente: clienteId,
            kit: kit.nome,
            quantidade: qtd,
            total: valorVendaTotal
        });

        alert("Produção registrada! Estoque atualizado e venda computada.");
    });
}
</script>
