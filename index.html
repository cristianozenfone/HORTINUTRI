<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HORTINUTRI ERP v9</title>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:#f4f7f6;
margin:0;
}

.navbar{
background:#2e7d32;
display:flex;
}

.nav-item{
color:white;
padding:15px;
cursor:pointer;
flex:1;
text-align:center;
font-weight:bold;
}

.nav-item.active{
background:#1b5e20;
}

.container{
padding:20px;
max-width:1100px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 4px 6px rgba(0,0,0,0.05);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
}

input,select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.btn-save{
background:#2e7d32;
color:white;
}

.btn-edit{
background:#ff9800;
color:white;
}

.btn-delete{
background:#d32f2f;
color:white;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #eee;
}

</style>
</head>

<body onload="iniciarApp()">

<div class="navbar">

<div class="nav-item active" onclick="changeTab('cad')">CADASTROS</div>
<div class="nav-item" onclick="changeTab('mix')">MIX/KITS</div>
<div class="nav-item" onclick="changeTab('fin')">FINANCEIRO</div>
<div class="nav-item" onclick="changeTab('rel')">RELATÓRIOS</div>

</div>

<div class="container">

<div id="cad">

<div class="card">

<h3>Cadastro de Insumos</h3>

<div class="grid">

<input id="ins-nome" placeholder="Nome">
<input id="ins-fc" placeholder="FC">
<input id="ins-preco" placeholder="Preço KG">

</div>

<br>

<button class="btn-save" onclick="salvarInsumo()">Salvar</button>

</div>

<div class="card">

<h3>Lista de Insumos</h3>

<div id="tabela-insumos"></div>

</div>

</div>

<div id="mix" style="display:none">

<div class="card">

<h3>Ficha Técnica</h3>

<input id="mix-nome" placeholder="Nome Produto">

<div class="grid">

<select id="sel-insumo"></select>

<input id="mix-peso" placeholder="Peso g">

<button onclick="addIngrediente()">Adicionar</button>

</div>

<div id="lista"></div>

<br>

Preço Venda

<input id="mix-preco">

<br><br>

<button class="btn-save" onclick="salvarMix()">Salvar Produto</button>

</div>

<div class="card">

<h3>Produtos</h3>

<div id="tabela-produtos"></div>

</div>

</div>

<div id="fin" style="display:none">

<div class="card">

<h3>Registrar Venda</h3>

<select id="venda-prod"></select>

<input id="venda-qtd" value="1">

<button class="btn-save" onclick="registrarVenda()">Vender</button>

</div>

<div class="card">

<h3>Histórico</h3>

<div id="tabela-vendas"></div>

</div>

</div>

<div id="rel" style="display:none">

<div class="card">

<h3>Resumo Financeiro</h3>

Faturamento: <b id="fat">0</b><br>
Custo: <b id="cus">0</b><br>
Lucro: <b id="luc">0</b>

</div>

</div>

</div>

<script>

const firebaseConfig = {

apiKey:"AIzaSyAs-W_ZGYzNWMwZDktODkzYS00NWY2LTkyYjEtZDQwYWQwZGMzMGRm",
authDomain:"hortinutri-3f2ea.firebaseapp.com",
databaseURL:"https://hortinutri-3f2ea-default-rtdb.firebaseio.com",
projectId:"hortinutri-3f2ea"

}

let db

let ingredientes=[]

let editing=null

let dados={
insumos:{},
produtos:{},
vendas:{}
}

function iniciarApp(){

firebase.initializeApp(firebaseConfig)

db=firebase.database()

escutar()

}

function escutar(){

db.ref("erp_v2/insumos").on("value",s=>{

dados.insumos=s.val()||{}

tabelaInsumos()

selectInsumos()

})

db.ref("erp_v2/produtos_final").on("value",s=>{

dados.produtos=s.val()||{}

tabelaProdutos()

selectProdutos()

})

db.ref("erp_v2/vendas").on("value",s=>{

dados.vendas=s.val()||{}

tabelaVendas()

relatorio()

})

}

function changeTab(t){

document.getElementById("cad").style.display="none"
document.getElementById("mix").style.display="none"
document.getElementById("fin").style.display="none"
document.getElementById("rel").style.display="none"

document.getElementById(t).style.display="block"

}

function salvarInsumo(){

let n=document.getElementById("ins-nome").value
let fc=document.getElementById("ins-fc").value
let p=document.getElementById("ins-preco").value

if(!n||!fc||!p){

alert("Preencha todos campos")

return

}

db.ref("erp_v2/insumos").push({

nome:n.toUpperCase(),
fc:fc,
preco:p

})

}

function tabelaInsumos(){

let html="<table>"

for(let id in dados.insumos){

let i=dados.insumos[id]

html+=`<tr>

<td>${i.nome}</td>

<td>

<button class="btn-delete"
onclick="deletar('erp_v2/insumos/${id}')">Excluir</button>

</td>

</tr>`

}

html+="</table>"

document.getElementById("tabela-insumos").innerHTML=html

}

function selectInsumos(){

let h="<option></option>"

for(let id in dados.insumos){

h+=`<option value="${id}">${dados.insumos[id].nome}</option>`

}

document.getElementById("sel-insumo").innerHTML=h

}

function addIngrediente(){

let id=document.getElementById("sel-insumo").value
let peso=document.getElementById("mix-peso").value

if(!id||!peso){

alert("Informe insumo e peso")

return

}

let ins=dados.insumos[id]

let custo=(peso/1000)*ins.fc*ins.preco

ingredientes.push({

nome:ins.nome,
peso:peso,
custo:custo

})

desenhar()

}

function desenhar(){

let html=""

ingredientes.forEach((i,x)=>{

html+=`${i.nome} ${i.peso}g R$${i.custo.toFixed(2)}
<button onclick="ingredientes.splice(${x},1);desenhar()">X</button><br>`

})

document.getElementById("lista").innerHTML=html

}

function salvarMix(){

let nome=document.getElementById("mix-nome").value
let preco=document.getElementById("mix-preco").value

if(!nome||!preco||ingredientes.length==0){

alert("Preencha dados")

return

}

let custo=0

ingredientes.forEach(i=>custo+=i.custo)

let obj={

nome:nome,
custoProducao:custo,
precoSugerido:preco,
ingredientes:ingredientes

}

if(editing){

db.ref("erp_v2/produtos_final/"+editing).update(obj)

editing=null

}else{

db.ref("erp_v2/produtos_final").push(obj)

}

ingredientes=[]

desenhar()

}

function tabelaProdutos(){

let html="<table>"

for(let id in dados.produtos){

let p=dados.produtos[id]

html+=`<tr>

<td>${p.nome}</td>

<td>R$${p.precoSugerido}</td>

<td>

<button class="btn-edit"
onclick="editar('${id}')">Corrigir</button>

<button class="btn-delete"
onclick="deletar('erp_v2/produtos_final/${id}')">Excluir</button>

</td>

</tr>`

}

html+="</table>"

document.getElementById("tabela-produtos").innerHTML=html

}

function editar(id){

let p=dados.produtos[id]

editing=id

document.getElementById("mix-nome").value=p.nome
document.getElementById("mix-preco").value=p.precoSugerido

ingredientes=p.ingredientes||[]

desenhar()

window.scrollTo(0,0)

}

function selectProdutos(){

let h=""

for(let id in dados.produtos){

h+=`<option value="${id}">
${dados.produtos[id].nome}
</option>`

}

document.getElementById("venda-prod").innerHTML=h

}

function registrarVenda(){

let id=document.getElementById("venda-prod").value
let qtd=document.getElementById("venda-qtd").value

let prod=dados.produtos[id]

let total=qtd*prod.precoSugerido

db.ref("erp_v2/vendas").push({

produto:prod.nome,
idProduto:id,
qtd:qtd,
total:total

})

}

function tabelaVendas(){

let html="<table>"

for(let id in dados.vendas){

let v=dados.vendas[id]

html+=`<tr>

<td>${v.produto}</td>
<td>${v.qtd}</td>
<td>R$${v.total}</td>

<td>

<button onclick="deletar('erp_v2/vendas/${id}')">Excluir</button>

</td>

</tr>`

}

html+="</table>"

document.getElementById("tabela-vendas").innerHTML=html

}

function relatorio(){

let fat=0
let cus=0

for(let id in dados.vendas){

let v=dados.vendas[id]

fat+=parseFloat(v.total)

let p=dados.produtos[v.idProduto]

if(p){

cus+=p.custoProducao*v.qtd

}

}

document.getElementById("fat").innerText=fat.toFixed(2)

document.getElementById("cus").innerText=cus.toFixed(2)

document.getElementById("luc").innerText=(fat-cus).toFixed(2)

}

function deletar(path){

if(confirm("Deseja excluir?")){

if(confirm("Tem certeza absoluta?")){

db.ref(path).remove()

}

}

}

</script>

</body>
</html>
