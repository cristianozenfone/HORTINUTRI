<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HortiNutri ERP+</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; background: #f4f4f4; }
        .sidebar { width: 200px; background: #2c3e50; color: white; min-height: 100vh; padding: 10px; }
        .sidebar div { padding: 10px; cursor: pointer; border-bottom: 1px solid #34495e; }
        .sidebar div:hover { background: #34495e; }
        .main { flex: 1; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #27ae60; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #219150; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3 style="text-align:center;">HortiNutri+</h3>
        <div onclick="showTab('dashboard')">Dashboard</div>
        <div onclick="showTab('insumos')">Insumos</div>
        <div onclick="showTab('mix-kits')">Mix / Kits</div>
        <div onclick="showTab('vendas')">Vendas</div>
        <div onclick="showTab('relatorios')">Relatórios</div>
    </div>

    <div class="main">
        <div id="tab-dashboard" class="tab-content">
            <div class="card"><h1>Bem-vindo, Cristiano</h1><p>Selecione uma opção no menu lateral.</p></div>
        </div>

        <div id="tab-insumos" class="tab-content" style="display:none;">
            <div class="card">
                <h3>Cadastro de Insumos</h3>
                <input type="text" id="ins-nome" placeholder="Nome do Insumo">
                <select id="ins-unidade"><option value="Kg">Quilo (Kg)</option><option value="Un">Unidade (Un)</option></select>
                <button onclick="btnCadastrarInsumo()">Cadastrar</button>
            </div>
            <div class="card"><h4>Itens Cadastrados</h4><div id="lista-insumos-cadastrados"></div></div>
        </div>

        <div id="tab-mix-kits" class="tab-content" style="display:none;">
            <div class="card">
                <h3>Cadastro de Produtos (Mix)</h3>
                <input type="text" id="mix-nome" placeholder="Nome do Mix">
                <input type="number" id="mix-varejo" placeholder="Preço Varejo">
                <input type="number" id="mix-atacado" placeholder="Preço Atacado">
                <button onclick="btnSalvarProduto()">Salvar Produto</button>
            </div>
            <div class="card"><h4>Produtos Cadastrados</h4><div id="lista-produtos-cadastrados"></div></div>
        </div>

        <div id="tab-vendas" class="tab-content" style="display:none;">
            <div class="card">
                <h3>Registrar Venda</h3>
                <select id="venda-produto-select"></select>
                <input type="number" id="venda-valor-input" placeholder="Valor R$">
                <button onclick="btnConfirmarVenda()">Confirmar Venda</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAtdG9St1_3VBIQDVN0VX77USqPxSvY4wg",
            authDomain: "hortinutri-3f2ea.firebaseapp.com",
            databaseURL: "https://hortinutri-3f2ea-default-rtdb.firebaseio.com",
            projectId: "hortinutri-3f2ea",
            storageBucket: "hortinutri-3f2ea.firebaseapp.com",
            messagingSenderId: "596792658513",
            appId: "1:596792658513:web:92bb97b0d835efc5510670"
        };
        firebase.initializeApp(firebaseConfig);
    </script>
    <script src="app.js"></script>
</body>
</html>
