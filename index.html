<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HortiNutri ERP | Gestão Profissional</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #2e7d32;
            --sidebar-color: #263238;
            --bg-color: #f8f9fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { display: flex; background-color: var(--bg-color); min-height: 100vh; overflow-x: hidden; }

        /* Sidebar Restaurada com todos os itens */
        .sidebar {
            width: 170px; 
            height: 100vh;
            background-color: var(--sidebar-color);
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            overflow-y: auto; /* IMPORTANTE: Permite descer o menu no dedo */
            scrollbar-width: none; /* Esconde a barra no Firefox */
        }
        .sidebar::-webkit-scrollbar { display: none; } /* Esconde a barra no Chrome/Celular */

        .logo { padding: 15px; text-align: center; background: rgba(0,0,0,0.2); border-bottom: 1px solid #444; }
        .logo h2 { color: var(--primary-color); font-size: 16px; }

        nav ul { list-style: none; padding: 10px 0; }
        nav ul li {
            padding: 10px 12px;
            cursor: pointer;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }
        nav ul li:hover, nav ul li.active { background: var(--primary-color); }
        .menu-title { padding: 12px 12px 4px; font-size: 9px; color: #888; font-weight: bold; }

        /* Conteúdo Principal */
        .main-content { 
            margin-left: 170px; 
            width: calc(100% - 170px); 
            display: flex;
            flex-direction: column;
        }

        .top-header {
            background: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .top-header h1 { font-size: 14px; }

        #content-area { padding: 15px; }

        .dashboard-cards { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .card-mini { background: white; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 4px solid var(--primary-color); }
        .card-mini h3 { font-size: 12px; }
        .card-mini p { font-size: 14px; font-weight: bold; }

        @media (max-width: 480px) {
            .sidebar { width: 145px; }
            .main-content { margin-left: 145px; width: calc(100% - 145px); }
            .sidebar li { font-size: 9px; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo"><h2>HortiNutri</h2></div>
        <nav>
            <ul>
                <li onclick="showTab('dashboard')" class="active"><i class="fas fa-chart-line"></i> DASHBOARD</li>
                
                <li class="menu-title">CADASTROS</li>
                <li onclick="showTab('clientes')"><i class="fas fa-users"></i> CLIENTES</li>
                <li onclick="showTab('insumos')"><i class="fas fa-carrot"></i> INSUMOS</li>
                <li onclick="showTab('embalagens')"><i class="fas fa-box-open"></i> EMBALAGENS</li>
                
                <li class="menu-title">PRODUTOS</li>
                <li onclick="showTab('mix-kits')"><i class="fas fa-layer-group"></i> MIX / KITS</li>
                <li onclick="showTab('ficha-tecnica')"><i class="fas fa-list-check"></i> FICHA TÉCNICA</li>
                
                <li class="menu-title">PRODUÇÃO</li>
                <li onclick="showTab('producao-insumos')"><i class="fas fa-warehouse"></i> INSUMOS</li>
                <li onclick="showTab('producao-produtos')"><i class="fas fa-boxes-stacked"></i> PRODUTOS</li>
                
                <li onclick="showTab('vendas')" class="menu-title" style="color:white; cursor:pointer; padding-top:15px; border-top:1px solid #444;"><i class="fas fa-cart-shopping"></i> VENDAS</li>
                <li onclick="showTab('relatorios')" class="menu-title" style="color:white; cursor:pointer;"><i class="fas fa-file-invoice-dollar"></i> RELATÓRIOS</li>
                <li onclick="showTab('financeiro')" class="menu-title" style="color:white; cursor:pointer;"><i class="fas fa-money-bill-trend-up"></i> FINANCEIRO</li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <h1 id="current-tab-title">DASHBOARD</h1>
            <div class="user-info" style="font-size: 10px;">
                <span><i class="fas fa-user-circle"></i> Admin</span>
            </div>
        </header>

        <section id="content-area">
            <div id="tab-dashboard" class="tab-content">
                <div class="dashboard-cards">
                    <div class="card-mini"><h3>Vendas Hoje</h3><p>R$ 0,00</p></div>
                    <div class="card-mini"><h3>Produção Ativa</h3><p>0 itens</p></div>
                </div>
            </div>
        </section>
    </main>

    <script src="firebase.js"></script>
    <script src="app.js"></script>
</body>
</html>
