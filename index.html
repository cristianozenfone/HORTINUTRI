<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HortiNutri Cloud - Solução Final</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2e7d32; --secondary: #1976d2; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        .navbar { background: var(--primary); display: flex; sticky: top; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .nav-item { color: white; padding: 15px; cursor: pointer; flex: 1; text-align: center; font-weight: bold; font-size: 14px; }
        .nav-item.active { background: rgba(255,255,255,0.2); border-bottom: 4px solid white; }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { border: none; font-weight: bold; cursor: pointer; padding: 15px; border-radius: 8px; color: white; width: 100%; background: var(--primary); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .stat-box { padding: 15px; border-radius: 10px; color: white; text-align: center; font-weight: bold; margin-bottom: 10px; flex: 1; }
        .flex-stats { display: flex; gap: 10px; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-item active" onclick="showTab('cadastros')">📂 CADASTROS</div>
    <div class="nav-item" onclick="showTab('vendas')">💰 VENDAS</div>
</div>

<div class="container">
    <div id="tab-cadastros" class="tab-pane">
        <div class="card">
            <h3>Novo Cadastro</h3>
            <select id="cad-tipo">
                <option value="insumos">🥦 Insumos / Legumes</option>
                <option value="clientes">🤝 Clientes</option>
                <option value="embalagens">📦 Embalagens</option>
            </select>
            <input type="text" id="cad-nome" placeholder="Nome do Item">
            <input type="number" id="cad-valor" placeholder="Valor (R$)">
            <button class="btn" onclick="salvarCadastro()">SALVAR NO FIREBASE</button>
        </div>
        <div class="card">
            <h3>Registros Encontrados</h3>
            <div id="tabela-cadastros">Sincronizando com a Nuvem...</div>
        </div>
    </div>

    <div id="tab-vendas" class="tab-pane" style="display:none;">
        <div class="card">
            <h3>Histórico e Financeiro</h3>
            <div class="flex-stats">
                <div class="stat-box" style="background:var(--secondary)">Vendas: <br><span id="res-v">R$ 0,00</span></div>
                <div class="stat-box" style="background:#ef4444">Custos: <br><span id="res-c">R$ 0,00</span></div>
            </div>
            <div id="lista-vendas-html"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAs-W_ZGYzNWMwZDktODkzYS00NWY2LTkyYjEtZDQwYWQwZGMzMGRm",
        authDomain: "hortinutri-3f2ea.firebaseapp.com",
        databaseURL: "https://hortinutri-3f2ea-default-rtdb.firebaseio.com",
        projectId: "hortinutri-3f2ea",
        storageBucket: "hortinutri-3f2ea.appspot.com",
        messagingSenderId: "596792658513",
        appId: "1:596792658513:web:92bb97b0d835efc5510670"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ESCUTA GLOBAL - FORÇA A LEITURA DE QUALQUER DADO
    db.ref('/').on('value', snapshot => {
        const dados = snapshot.val() || {};
        console.log("DADOS RECEBIDOS:", dados);
        
        // Renderiza Cadastros (Insumos/Clientes)
        const tipo = document.getElementById('cad-tipo').value;
        const lista = dados[tipo] || {};
        let html = `<table><tr><th>Nome</th><th>Valor</th></tr>`;
        
        Object.keys(lista).forEach(id => {
            const item = lista[id];
            html += `<tr><td>${item.nome || 'Sem Nome'}</td><td>R$ ${parseFloat(item.valor || 0).toFixed(2)}</td></tr>`;
        });
        document.getElementById('tabela-cadastros').innerHTML = html + "</table>";

        // Renderiza Vendas e Financeiro
        const vendas = dados.vendas || {};
        let htmlV = `<table><tr><th>Produto</th><th>Total</th></tr>`;
        let totalV = 0, totalC = 0;

        Object.keys(vendas).forEach(id => {
            const v = vendas[id];
            totalV += parseFloat(v.preco || 0);
            totalC += parseFloat(v.custo || 0);
            htmlV += `<tr><td>${v.produto}</td><td>R$ ${parseFloat(v.preco || 0).toFixed(2)}</td></tr>`;
        });
        document.getElementById('lista-vendas-html').innerHTML = htmlV + "</table>";
        document.getElementById('res-v').innerText = "R$ " + totalV.toFixed(2);
        document.getElementById('res-c').innerText = "R$ " + totalC.toFixed(2);
    });

    function salvarCadastro() {
        const tipo = document.getElementById('cad-tipo').value;
        const nome = document.getElementById('cad-nome').value.toUpperCase();
        const valor = document.getElementById('cad-valor').value;
        if(nome) db.ref(tipo).push({ nome, valor: valor || 0 });
        document.getElementById('cad-nome').value = "";
        document.getElementById('cad-valor').value = "";
    }

    function showTab(tab) {
        document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
        document.getElementById('tab-' + tab).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
