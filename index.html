<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>HortiNutri ERP - Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* Estilização baseada nas cores do seu sistema (Verde e Branco) */
        :root { --primary: #2d5a27; --secondary: #4caf50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
        .header { background: var(--primary); color: white; padding: 15px; display: flex; gap: 20px; }
        .container { padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box { padding: 20px; border-radius: 8px; color: white; text-align: center; }
        button { cursor: pointer; padding: 10px 20px; border: none; border-radius: 4px; transition: 0.3s; }
        .btn-save { background: var(--secondary); color: white; }
        .btn-pdf { background: #e74c3c; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border-bottom: 1px solid #ddd; padding: 12px; text-align: left; }
    </style>
</head>
<body>

<div class="header">
    <div onclick="showTab('vendas')">💰 VENDAS</div>
    <div onclick="showTab('relatorios')">📊 RELATÓRIOS</div>
</div>

<div class="container">
    <div id="tab-vendas" class="tab-content">
        <div class="card">
            <h3>Registrar Venda</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="text" id="venda-cliente" placeholder="Nome do Cliente">
                <input type="text" id="venda-produto" placeholder="Produto/Kit">
                <input type="number" id="venda-qtd" value="1" placeholder="Qtd">
                <input type="number" id="venda-preco" placeholder="Preço Un. (R$)">
                <input type="number" id="venda-custo" placeholder="Custo Un. (R$)">
                <button class="btn-save" onclick="lancarVenda()">✅ LANÇAR VENDA</button>
            </div>
        </div>

        <div class="card">
            <h3>Últimas Vendas</h3>
            <table id="tabela-vendas">
                <thead>
                    <tr>
                        <th>Data/Hora</th>
                        <th>Cliente</th>
                        <th>Produto</th>
                        <th>Qtd</th>
                        <th>Total</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody id="lista-vendas-corpo"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-relatorios" class="tab-content" style="display:none;">
        <div class="stats-grid">
            <div class="stat-box" style="background: #2980b9;">Total Vendas<br><strong id="resumo-vendas">R$ 0,00</strong></div>
            <div class="stat-box" style="background: #c0392b;">Total Custos<br><strong id="resumo-custos">R$ 0,00</strong></div>
            <div class="stat-box" style="background: #27ae60;">Lucro Real<br><strong id="resumo-lucro">R$ 0,00</strong></div>
            <div class="stat-box" style="background: #f39c12;">Margem Médio<br><strong id="resumo-margem">0%</strong></div>
        </div>
        
        <div class="card">
            <button class="btn-pdf" onclick="exportarRelatorioPDF()">📄 GERAR PDF COMPLETO</button>
        </div>
    </div>
</div>

<script>
    // Estrutura de dados local (deve ser integrada com seu Firebase)
    let vendasAtuais = [];

    function lancarVenda() {
        const cliente = document.getElementById('venda-cliente').value;
        const produto = document.getElementById('venda-produto').value;
        const qtd = parseFloat(document.getElementById('venda-qtd').value);
        const preco = parseFloat(document.getElementById('venda-preco').value) || 0;
        const custo = parseFloat(document.getElementById('venda-custo').value) || 0;

        // 1. DATA E HORA
        const agora = new Date();
        const dataFormatada = agora.toLocaleDateString('pt-BR') + ' ' + agora.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'});

        const novaVenda = {
            id: Date.now(),
            data: dataFormatada,
            cliente: cliente || "Consumidor Final",
            produto: produto,
            qtd: qtd,
            precoUn: preco,
            custoUn: custo,
            total: qtd * preco,
            lucro: (preco - custo) * qtd
        };

        vendasAtuais.unshift(novaVenda);
        atualizarInterface();
        limparCampos();
    }

    function atualizarInterface() {
        // Atualiza Tabela
        const corpo = document.getElementById('lista-vendas-corpo');
        corpo.innerHTML = vendasAtuais.map(v => `
            <tr>
                <td>${v.data}</td>
                <td>${v.cliente}</td>
                <td>${v.produto}</td>
                <td>${v.qtd}</td>
                <td>R$ ${v.total.toFixed(2)}</td>
                <td><button onclick="deletarVenda(${v.id})">🗑️</button></td>
            </tr>
        `).join('');

        // 2. RELATÓRIO COMPLETO (Soma e Médias)
        const totalVendas = vendasAtuais.reduce((acc, v) => acc + v.total, 0);
        const totalCustos = vendasAtuais.reduce((acc, v) => acc + (v.custoUn * v.qtd), 0);
        const lucroTotal = totalVendas - totalCustos;
        const margem = totalVendas > 0 ? (lucroTotal / totalVendas) * 100 : 0;

        document.getElementById('resumo-vendas').innerText = `R$ ${totalVendas.toFixed(2)}`;
        document.getElementById('resumo-custos').innerText = `R$ ${totalCustos.toFixed(2)}`;
        document.getElementById('resumo-lucro').innerText = `R$ ${lucroTotal.toFixed(2)}`;
        document.getElementById('resumo-margem').innerText = `${margem.toFixed(1)}%`;
    }

    // 3. EXPORTAR PDF
    function exportarRelatorioPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFontSize(18);
        doc.text("Relatório de Vendas - HortiNutri", 14, 20);
        
        doc.setFontSize(12);
        doc.text(`Data de Emissão: ${new Date().toLocaleDateString('pt-BR')}`, 14, 30);

        const colunas = ["Data/Hora", "Cliente", "Produto", "Venda (R$)", "Lucro (R$)"];
        const linhas = vendasAtuais.map(v => [
            v.data, 
            v.cliente, 
            v.produto, 
            v.total.toFixed(2), 
            v.lucro.toFixed(2)
        ]);

        doc.autoTable({
            startY: 35,
            head: [colunas],
            body: linhas,
            theme: 'grid',
            headStyles: { fillColor: [45, 90, 39] }
        });

        doc.save(`Relatorio_HortiNutri_${Date.now()}.pdf`);
    }

    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById('tab-' + tab).style.display = 'block';
    }

    function limparCampos() {
        document.getElementById('venda-cliente').value = '';
        document.getElementById('venda-produto').value = '';
        document.getElementById('venda-preco').value = '';
        document.getElementById('venda-custo').value = '';
    }

    function deletarVenda(id) {
        vendasAtuais = vendasAtuais.filter(v => v.id !== id);
        atualizarInterface();
    }
</script>
</body>
</html>
