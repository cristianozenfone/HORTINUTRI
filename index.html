<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HortiNutri - Estabilizado</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #2e7d32; --secondary: #1976d2; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        .navbar { background: var(--primary); display: flex; sticky: top; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .nav-item { color: white; padding: 15px; cursor: pointer; flex: 1; text-align: center; font-weight: bold; }
        .nav-item.active { background: rgba(255,255,255,0.2); border-bottom: 4px solid white; }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { border: none; font-weight: bold; cursor: pointer; padding: 15px; border-radius: 8px; color: white; width: 100%; background: var(--primary); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .empty-msg { text-align: center; color: #999; padding: 20px; }
    </style>
</head>
<body>

<div class="navbar">
    <div class="nav-item active" onclick="showTab('cadastros')">📂 CADASTROS</div>
    <div class="nav-item" onclick="showTab('vendas')">💰 VENDAS</div>
</div>

<div class="container">
    <div id="tab-cadastros" class="tab-pane">
        <div class="card">
            <h3>Novo Registro</h3>
            <select id="cad-tipo" onchange="renderizar()">
                <option value="insumos">🥦 Insumos / Legumes</option>
                <option value="clientes">🤝 Clientes</option>
            </select>
            <input type="text" id="cad-nome" placeholder="Nome">
            <input type="number" id="cad-valor" placeholder="Valor (R$)">
            <button class="btn" onclick="salvar()">SALVAR NO FIREBASE</button>
        </div>
        <div class="card">
            <div id="tabela-dados">Buscando dados no banco...</div>
        </div>
    </div>

    <div id="tab-vendas" class="tab-pane" style="display:none;">
        <div class="card">
            <h3>Histórico de Vendas</h3>
            <div id="tabela-vendas">Nenhuma venda encontrada.</div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAs-W_ZGYzNWMwZDktODkzYS00NWY2LTkyYjEtZDQwYWQwZGMzMGRm",
        authDomain: "hortinutri-3f2ea.firebaseapp.com",
        databaseURL: "https://hortinutri-3f2ea-default-rtdb.firebaseio.com",
        projectId: "hortinutri-3f2ea",
        storageBucket: "hortinutri-3f2ea.appspot.com",
        messagingSenderId: "596792658513",
        appId: "1:596792658513:web:92bb97b0d835efc5510670"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let cacheDados = {};

    // ESCUTA GLOBAL - Captura tudo o que existe no banco
    db.ref('/').on('value', snapshot => {
        cacheDados = snapshot.val() || {};
        console.log("Dados Brutos do Banco:", cacheDados);
        renderizar();
    });

    function renderizar() {
        const tipo = document.getElementById('cad-tipo').value;
        
        // BUSCA FLEXÍVEL: Tenta o nome selecionado OU nomes antigos comuns
        let lista = cacheDados[tipo] || cacheDados['produtos'] || cacheDados['legumes'] || {};
        
        let html = `<table><tr><th>Nome</th><th>Valor</th><th>Ação</th></tr>`;
        let keys = Object.keys(lista);

        if (keys.length === 0) {
            html = `<div class="empty-msg">Nenhum dado encontrado na pasta "${tipo}".</div>`;
        } else {
            keys.forEach(id => {
                const item = lista[id];
                const nome = item.nome || item.item || "Sem nome";
                const valor = item.valor || item.preco || 0;
                html += `<tr>
                    <td>${nome}</td>
                    <td>R$ ${parseFloat(valor).toFixed(2)}</td>
                    <td><button style="color:red; background:none; border:none; cursor:pointer" onclick="remover('${tipo}/${id}')">🗑️</button></td>
                </tr>`;
            });
            html += `</table>`;
        }
        document.getElementById('tabela-dados').innerHTML = html;
    }

    function salvar() {
        const tipo = document.getElementById('cad-tipo').value;
        const nome = document.getElementById('cad-nome').value.toUpperCase();
        const valor = document.getElementById('cad-valor').value;
        if(nome) db.ref(tipo).push({ nome, valor: valor || 0 });
        document.getElementById('cad-nome').value = "";
        document.getElementById('cad-valor').value = "";
    }

    function remover(caminho) {
        if(confirm("Excluir?")) db.ref(caminho).remove();
    }

    function showTab(tab) {
        document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
        document.getElementById('tab-' + tab).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }
</script>
</body>
</html>
